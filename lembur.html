<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FORM Lembur - Hyundai Solusi Mobilitas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <style>
        :root {
            --hyundai-navy: #002c5f;
            --electric-blue: #00aad2;
            --bg-dark: #1e293b;
            --panel-dark: #334155;
            --input-bg: #475569;
            --text-light: #f1f5f9;
            --border-tech: #64748b;
        }
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            padding: 15px;
            color: var(--text-light);
        }

        .input-panel {
            max-width: 800px;
            margin: 0 auto;
            background: var(--panel-dark);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .form-header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-tech);
            padding-bottom: 15px;
        }

        .form-header h2 { margin: 0; color: var(--electric-blue); font-size: 1.5rem; }
        .form-header p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.7; }

        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        @media screen and (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
            .full-mobile { grid-column: span 1 !important; }
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .span-2 { grid-column: span 2; }

        label { 
            font-size: 11px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            color: var(--electric-blue);
        }

        input, select, textarea { 
            padding: 14px; 
            background: var(--input-bg);
            border: 1px solid var(--border-tech); 
            border-radius: 12px; 
            font-size: 15px; 
            color: white;
            transition: all 0.2s; 
            width: 100%; 
            box-sizing: border-box; 
            appearance: none;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 0 3px rgba(0, 170, 210, 0.2);
            background: #404e5f;
        }

        .btn-print {
            width: 100%; 
            padding: 18px; 
            background: var(--electric-blue);
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px; 
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 170, 210, 0.4); }

        #print-area { display: none; }

        @media print {
            .input-panel { display: none; }
            body { background: white; padding: 0; margin: 0; }
            #print-area { display: block; width: 210mm; height: 297mm; color: black; }
            
            .print-wrapper {
                height: 148.5mm;
                padding: 10mm;
                box-sizing: border-box;
                position: relative;
                border-bottom: 1px dashed #ccc;
                overflow: hidden;
            }

            .header { display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #002c5f; padding-left: 15px; margin-bottom: 15px; }
            .logo-brand img { height: 40px; }
            .title-box h1 { margin: 0; font-size: 16pt; color: #002c5f; }
            .grid-container { display: flex; gap: 15px; }
            .data-side { flex: 2; }
            .modern-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
            .modern-table td { padding: 8px 12px; font-size: 9pt; background: #f8fafc; }
            .label-cell { width: 30%; font-weight: 700; color: white; background: #002c5f !important; font-size: 7.5pt; text-transform: uppercase; }
            .content-cell { border: 1px solid #cbd5e1; border-left: none; }
            .photo-frame { width: 60mm; height: 70mm; border: 2px solid #002c5f; overflow: hidden; }
            .photo-frame img { width: 100%; height: 100%; object-fit: contain; }
            .signature-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
            .sig-item { border: 1px solid #cbd5e1; padding: 5px; text-align: center; }
            .sig-role { font-size: 7pt; font-weight: bold; color: #00aad2; margin-bottom: 40px; border-bottom: 1px solid #eee; }
            .sig-name { font-size: 8pt; font-weight: bold; }
        }
    </style>
</head>
<body onload="updateData()">

<div class="input-panel">
    <div class="form-header">
        <h2>E-Overtime</h2>
        <p>PT. Hyundai Solusi Mobilitas - Glovis Indonesia International</p>
    </div>

    <div class="input-grid">
        <div class="input-group span-2 full-mobile">
            <label>Nama Lengkap</label>
            <select id="in_nama" onchange="updateData()">
                <option value="">-- Pilih Nama --</option>
                <option value="Alfian Ubaidillah">Alfian Ubaidillah</option>
                <option value="Arfian Efendi">Arfian Efendi</option>
                <option value="Cecep Iwan Setiawan">Cecep Iwan Setiawan</option>
                <option value="Derry Aditya Royadi">Derry Aditya Royadi</option>
                <option value="Misto">Misto</option>
            </select>
        </div>

        <div class="input-group">
            <label>Tanggal Tugas</label>
            <input type="date" id="in_tgl" oninput="updateData()">
        </div>
        <div class="input-group">
            <label>Department</label>
            <input type="text" id="in_dept" value="HG CCL" oninput="updateData()">
        </div>

        <div class="input-group">
            <label>Jam Mulai Lembur</label>
            <input type="time" id="in_req_mulai" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Jam Akhir Lembur</label>
            <input type="time" id="in_req_akhir" oninput="calculate()">
        </div>

        <div class="input-group span-2 full-mobile">
            <label>Divisi / Jabatan</label>
            <select id="in_divisi" onchange="updateData()">
                <option value="">-- Pilih Divisi --</option>
                <option value="Operator">Operator</option>
                <option value="Admin">Admin</option>
            </select>
        </div>

        <div class="input-group span-2 full-mobile">
            <label>Upload Bukti Pekerjaan</label>
            <input type="file" id="in_foto" accept="image/*" onchange="handleImage(this)">
        </div>

        <div class="input-group span-2 full-mobile">
            <label>Total Jam Lembur</label>
            <input type="text" id="in_total" readonly style="background: rgba(0,170,210,0.1); color: var(--electric-blue); font-weight: bold;">
        </div>

        <div class="input-group span-2 full-mobile">
            <label>Detail Aktivitas</label>
            <textarea id="in_reason" rows="3" placeholder="Detail Tugas...." oninput="updateData()"></textarea>
        </div>
    </div>
    
    <button class="btn-print" id="btnSubmit" onclick="prosesLembur()">Cetak & Simpan Data</button>
</div>

<div id="print-area">
    <div id="form-top" class="print-wrapper"></div>
    <div id="form-bottom" class="print-wrapper"></div>
</div>

<template id="form-content">
    <div class="header">
        <div class="logo-brand"><img src="Hyundai_logo.png" alt="Hyundai"></div>
        <div class="title-box">
            <h1>OVERTIME AUTHORIZATION</h1>
            <p>PT. Hyundai Solusi Mobilitas | GII</p>
        </div>
    </div>
    <div class="grid-container">
        <div class="data-side">
            <table class="modern-table">
                <tr><td class="label-cell">Nama</td><td class="content-cell"><strong class="out_nama">-</strong></td></tr>
                <tr><td class="label-cell">Tanggal</td><td class="content-cell out_tgl">-</td></tr>
                <tr><td class="label-cell">Request Time</td><td class="content-cell"><span class="out_req_mulai">-</span> s/d <span class="out_req_akhir">-</span></td></tr>
                <tr><td class="label-cell">Total LEMBUR</td><td class="content-cell out_total" style="color:#00aad2; font-weight:800;">-</td></tr>
                <tr><td class="label-cell">Div. / Dept</td><td class="content-cell"><span class="out_divisi">-</span> / <span class="out_dept">-</span></td></tr>
                <tr><td class="label-cell">Aktivitas</td><td class="content-cell out_reason" style="height:45px; vertical-align:top; font-size:8pt;">-</td></tr>
            </table>
        </div>
        <div class="photo-side" style="flex:1.2; text-align:center;">
            <div style="font-size:7pt; font-weight:800; color:#002c5f; margin-bottom:5px;">EVIDENCE ATTACHMENT</div>
            <div class="photo-frame" style="margin:0 auto;"><img class="out_img" src=""></div>
        </div>
    </div>
    <div class="signature-grid">
        <div class="sig-item"><div class="sig-role">OPERATOR (REQUESTER)</div><div class="sig-name out_sig_nama">-</div></div>
        <div class="sig-item"><div class="sig-role">LEAD (CHECKED)</div><div class="sig-name">Alfian Ubaidillah</div></div>
        <div class="sig-item"><div class="sig-role">SUPERVISOR (VERIFIED)</div><div class="sig-name">Wahyu Putra Rahmadi</div></div>
        <div class="sig-item"><div class="sig-role">MANAGER (APPROVED)</div><div class="sig-name">Johan Wahyudi</div></div>
    </div>
</template>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaLf-fbX8KXkoJNY_g_XZAk9tQ9TNfsIuRzugLJ2PmAILBFG9o2wO7Pdtmfnx4axNDRA/exec";

const template = document.getElementById('form-content').innerHTML;
document.getElementById('form-top').innerHTML = template;
document.getElementById('form-bottom').innerHTML = template;

function updateData() {
    const fields = ['nama', 'tgl', 'divisi', 'dept', 'reason', 'req_mulai', 'req_akhir'];
    fields.forEach(f => {
        let elInput = document.getElementById('in_' + f);
        if (!elInput) return;
        
        let val = elInput.value;
        
        if (f === 'tgl' && val) {
            const dateObj = new Date(val);
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = months[dateObj.getMonth()];
            const year = dateObj.getFullYear();
            val = `${day} ${month} ${year}`;
        }

        document.querySelectorAll('.out_' + f).forEach(el => el.innerText = val || '-');
        if(f === 'nama') document.querySelectorAll('.out_sig_nama').forEach(el => el.innerText = val || '-');
    });
}

function calculate() {
    const reqS = document.getElementById('in_req_mulai').value;
    const reqE = document.getElementById('in_req_akhir').value;

    if(reqS && reqE) {
        let start = new Date("2026-01-01T" + reqS);
        let end = new Date("2026-01-01T" + reqE);
        
        if (end < start) end.setDate(end.getDate() + 1);
        
        let diffMs = end - start;
        let diffHrs = diffMs / (1000 * 60 * 60);
        let roundedHrs = Math.floor(diffHrs * 2) / 2;
        
        let hasil = roundedHrs >= 8 ? "FULL DAY" : roundedHrs.toFixed(1) + " HOURS";
        
        document.getElementById('in_total').value = hasil;
        document.querySelectorAll('.out_total').forEach(el => el.innerText = hasil);
    }
    updateData();
}

function handleImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            document.querySelectorAll('.out_img').forEach(img => img.src = e.target.result);
        }
        reader.readAsDataURL(input.files[0]);
    }
}

async function prosesLembur() {
    const btn = document.getElementById('btnSubmit');
    const nama = document.getElementById('in_nama').value;

    if (!nama) {
        alert("Pilih nama terlebih dahulu!");
        return;
    }

    btn.innerText = "Mengirim Data...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append("nama", nama); 
    formData.append("div_dept", document.getElementById('in_divisi').value + " / " + document.getElementById('in_dept').value); 
    formData.append("tanggal", document.getElementById('in_tgl').value); 
    formData.append("waktu_absen", ""); // DIKOSONGKAN SESUAI PERMINTAAN
    formData.append("request", document.getElementById('in_req_mulai').value + " s/d " + document.getElementById('in_req_akhir').value); 
    formData.append("total", document.getElementById('in_total').value); 
    formData.append("aktivitas", document.getElementById('in_reason').value); 

    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' 
        });

        setTimeout(() => {
            window.print();
            btn.innerText = "Cetak & Simpan Data";
            btn.disabled = false;
        }, 500);

    } catch (error) {
        console.error("Error:", error);
        alert("Terjadi kesalahan, namun Anda tetap bisa mencetak.");
        window.print();
        btn.disabled = false;
    }
}
</script>

</body>
</html>
