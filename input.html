<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Checklist BASTK</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <form id="bastkForm">
            <!-- Card 1: Identitas -->
            <div class="card">
                <div class="card-title">IDENTITAS KENDARAAN & SERAH TERIMA</div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Tanggal Transaksi</label>
                        <input type="text" id="display_tanggal" disabled>
                    </div>
                    <div class="form-group">
                        <label>Jenis Distribusi</label>
                        <input type="text" id="display_jenis" disabled>
                    </div>
                    <div class="form-group">
                        <label>Nomor Polisi / Plat</label>
                        <input type="text" id="no_polisi" placeholder="Contoh: B 1234 ABC" required style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label>Nama Perusahaan</label>
                        <input type="text" id="nama_perusahaan" required>
                    </div>
                    <div class="form-group">
                        <label>Nama PIC Penerima/Penyerah</label>
                        <input type="text" id="nama_pic" required>
                    </div>
                    <div class="form-group">
                        <label>Nomor Telepon PIC</label>
                        <input type="tel" id="no_telp" required>
                    </div>
                    <div class="form-group">
                        <label>Tipe Armada Hyundai</label>
                        <select id="type_kendaraan" required></select>
                    </div>
                </div>
            </div>

            <!-- Card 2: Checklist -->
            <div class="card">
                <div class="card-title">KELENGKAPAN KENDARAAN (CHECKLIST)</div>
                <div class="grid-checklist" id="checklist-container"></div>
            </div>

            <!-- Card 3: Upload Foto -->
            <div class="card">
                <div class="card-title">DOKUMENTASI FOTO (GALERI / KAMERA)</div>
                <div class="form-group">
                    <label>Pilih Gambar Unit Lampiran (Bisa pilih lebih dari 1 foto sekaligus)</label>
                    <input type="file" id="photos_input" accept="image/*" multiple required>
                </div>
            </div>

            <!-- Card 4: Tanda Tangan -->
            <div class="card">
                <div class="card-title" id="sig-title">OTORISASI (MENGETAHUI: PIC KENDARAAN)</div>
                <div class="signature-area">
                    <canvas id="sig-canvas"></canvas>
                    <button style="margin-top:8px; padding: 6px 12px; background:#e5e7eb; border:none; border-radius:4px; cursor:pointer;" id="clear-sig">Reset Tanda Tangan</button>
                </div>
            </div>

            <div class="action-buttons">
                <a href="index.html" class="btn-secondary">Kembali ke Halaman Utama</a>
                <button type="submit" class="btn-primary">Generate Dokumen BASTK</button>
            </div>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
