<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Studio Pro - DAC Media</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-soft: #eef2ff;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --text-soft: #475569;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .app-container { width: 100%; max-width: 650px; }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        header { text-align: center; margin-bottom: 30px; }
        h2 { margin: 0; font-size: 2rem; color: var(--primary); letter-spacing: -1px; }
        .subtitle { color: var(--text-soft); font-size: 0.95rem; margin-top: 8px; }

        .drop-zone {
            border: 2px dashed var(--border);
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .drop-zone:hover { border-color: var(--primary); background: var(--primary-soft); }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin: 25px 0;
            max-height: 350px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(241, 245, 249, 0.5);
            border-radius: 16px;
        }
        
        .preview-wrapper { position: relative; cursor: grab; }
        .preview-item { 
            width: 100%; aspect-ratio: 1/1; border-radius: 12px; 
            object-fit: cover; border: 3px solid white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            background: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; text-align: center; overflow: hidden;
        }
        
        .sortable-ghost { opacity: 0.3; }

        .remove-img {
            position: absolute; top: -8px; right: -8px;
            background: #ef4444; color: white; border: none;
            border-radius: 50%; width: 24px; height: 24px;
            cursor: pointer; z-index: 20; font-weight: bold;
        }

        .form-section { display: flex; flex-direction: column; gap: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-soft); margin-bottom: 8px; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            font-family: inherit; outline: none; box-sizing: border-box;
        }

        .btn-convert {
            width: 100%; background: var(--primary); color: white; border: none; padding: 18px;
            border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            transition: transform 0.2s;
        }
        .btn-convert:active { transform: scale(0.98); }
        .btn-convert:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        footer { margin-top: 40px; text-align: center; font-size: 0.85rem; color: var(--text-soft); }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <header>
            <span style="background: var(--primary-soft); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">V2.1 DA Project</span>
            <h2>PDF Studio Pro</h2>
            <p class="subtitle">Urutkan, Gabungkan & Buat PDF.</p>
        </header>

        <div class="drop-zone" id="dropZone">
            <p style="margin: 0; font-weight: 500;">Klik/Seret file ke sini</p>
            <p style="font-size: 0.8rem; color: var(--text-soft);">Mendukung JPG, PNG, PDF (Multi-upload)</p>
            <input type="file" id="fileInput" accept="image/*,application/pdf" multiple>
        </div>

        <div id="previewGrid" class="preview-grid" style="display: none;"></div>

        <div class="form-section">
            <input type="text" id="fileName" placeholder="Nama File Output (Opsional)">
            <div class="grid-inputs">
                <div>
                    <label>Ukuran Kertas</label>
                    <select id="pageSize">
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                        <option value="legal">Legal</option>
                    </select>
                </div>
                <div>
                    <label>Layout Halaman</label>
                    <select id="layoutMode">
                        <option value="1">1 Gambar / Hal</option>
                        <option value="2">2 Gambar / Hal</option>
                        <option value="4">4 Gambar / Hal (2x2)</option>
                        <option value="6">6 Gambar / Hal (2x3)</option>
                        <option value="8">8 Gambar / Hal (2x4)</option>
                    </select>
                </div>
            </div>
        </div>

        <button id="convertBtn" class="btn-convert" disabled>Proses & Download</button>
    </div>
    <footer>&copy; 2026 DAC Media Project</footer>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const previewGrid = document.getElementById('previewGrid');
    const convertBtn = document.getElementById('convertBtn');
    let fileItems = [];

    // Fitur Sortable (Drag & Drop urutan)
    new Sortable(previewGrid, {
        animation: 150,
        onEnd: () => {
            const newOrder = [];
            previewGrid.querySelectorAll('.preview-wrapper').forEach(el => {
                newOrder.push(fileItems[parseInt(el.dataset.index)]);
            });
            fileItems = newOrder;
            renderPreviews();
        }
    });

    // Drag & Drop event handlers
    ['dragover', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }));
    dropZone.onclick = () => fileInput.click();
    dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
    fileInput.onchange = e => handleFiles(e.target.files);

    function handleFiles(files) {
        // PERUBAHAN: fileItems = []; DIHAPUS agar file lama tidak hilang saat tambah file baru
        const filesArray = Array.from(files);
        let loadedCount = 0;

        if (filesArray.length === 0) return;

        filesArray.forEach(file => {
            const reader = new FileReader();
            if (file.type.startsWith('image/')) {
                reader.onload = e => { 
                    fileItems.push({ type: 'img', data: e.target.result }); 
                    checkProgress(); 
                };
                reader.readAsDataURL(file);
            } else if (file.type === 'application/pdf') {
                reader.onload = e => { 
                    fileItems.push({ type: 'pdf', data: e.target.result, name: file.name }); 
                    checkProgress(); 
                };
                reader.readAsArrayBuffer(file);
            } else {
                checkProgress(); // Lewati file tidak didukung
            }
        });

        function checkProgress() { 
            loadedCount++; 
            if(loadedCount === filesArray.length) {
                renderPreviews(); 
                fileInput.value = ''; // Reset input agar bisa upload file yang sama berkali-kali
            }
        }
    }

    function renderPreviews() {
        previewGrid.innerHTML = '';
        previewGrid.style.display = fileItems.length ? 'grid' : 'none';
        convertBtn.disabled = !fileItems.length;
        
        fileItems.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'preview-wrapper';
            div.dataset.index = i;
            div.innerHTML = `
                <div class="preview-item">
                    ${item.type==='img' ? `<img src="${item.data}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">` : `📄<br>${item.name.substring(0,10)}...`}
                </div>
                <button class="remove-img" onclick="removeSingleFile(${i})">&times;</button>
            `;
            previewGrid.appendChild(div);
        });
    }

    function removeSingleFile(index) {
        fileItems.splice(index, 1);
        renderPreviews();
    }

    async function getImageSize(src) {
        return new Promise(res => { 
            const img = new Image(); 
            img.onload = () => res({w: img.width, h: img.height}); 
            img.src = src; 
        });
    }

convertBtn.onclick = async () => {
        convertBtn.innerText = "⚡ Memproses...";
        convertBtn.disabled = true;
        try {
            const { jsPDF } = window.jspdf;
            const { PDFDocument, PageSizes } = PDFLib; // Tambahkan PageSizes
            const formatInput = document.getElementById('pageSize').value.toUpperCase();
            const layout = parseInt(document.getElementById('layoutMode').value);
            const finalPdfDoc = await PDFDocument.create();
            
            // Tentukan ukuran target berdasarkan pilihan user
            const targetSize = PageSizes[formatInput] || PageSizes.A4;

            let cursor = 0;
            while (cursor < fileItems.length) {
                if (fileItems[cursor].type === 'pdf') {
                    // --- LOGIKA PDF DENGAN RESIZE KE TARGET SIZE ---
                    const extPdf = await PDFDocument.load(fileItems[cursor].data);
                    const pages = await finalPdfDoc.copyPages(extPdf, extPdf.getPageIndices());
                    
                    for (const page of pages) {
                        const newPage = finalPdfDoc.addPage(targetSize);
                        const { width, height } = page.getSize();
                        
                        // Hitung rasio agar PDF asli muat di halaman target tanpa terpotong (fit to page)
                        const scale = Math.min(targetSize[0] / width, targetSize[1] / height);
                        const xCentered = (targetSize[0] - width * scale) / 2;
                        const yCentered = (targetSize[1] - height * scale) / 2;

                        const embeddedPage = await finalPdfDoc.embedPage(page);
                        newPage.drawPage(embeddedPage, {
                            x: xCentered,
                            y: yCentered,
                            width: width * scale,
                            height: height * scale,
                        });
                    }
                    cursor++;
                } else {
                    // --- LOGIKA GAMBAR (Tetap Menggunakan jsPDF untuk Layouting) ---
                    const format = document.getElementById('pageSize').value;
                    const tempJsPdf = new jsPDF({ orientation: 'p', unit: 'mm', format: format });
                    const pW = tempJsPdf.internal.pageSize.getWidth();
                    const pH = tempJsPdf.internal.pageSize.getHeight();
                    const margin = 10;

                    let cols = (layout === 1) ? 1 : 2;
                    let rows = Math.ceil(layout / cols);
                    if (layout === 4) rows = 2; // Paksa 2x2

                    let cellW = (pW - (margin * (cols + 1))) / cols;
                    let cellH = (pH - (margin * (rows + 1))) / rows;

                    for (let j = 0; j < layout && cursor < fileItems.length; j++) {
                        if (fileItems[cursor].type === 'pdf') break; 
                        
                        const dim = await getImageSize(fileItems[cursor].data);
                        let col = j % cols;
                        let row = Math.floor(j / cols);
                        
                        let startX = margin + (col * (cellW + margin));
                        let startY = margin + (row * (cellH + margin));
                        
                        let ratio = Math.min(cellW / dim.w, cellH / dim.h);
                        let w = dim.w * ratio;
                        let h = dim.h * ratio;
                        
                        tempJsPdf.addImage(fileItems[cursor].data, 'JPEG', startX + (cellW - w)/2, startY + (cellH - h)/2, w, h);
                        cursor++;
                    }
                    const tempDoc = await PDFDocument.load(tempJsPdf.output('arraybuffer'));
                    const pgs = await finalPdfDoc.copyPages(tempDoc, tempDoc.getPageIndices());
                    pgs.forEach(p => finalPdfDoc.addPage(p));
                }
            }

            const pdfBytes = await finalPdfDoc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
            link.download = (document.getElementById('fileName').value || "Project_DAC") + ".pdf";
            link.click();
            
            // Cleanup
            fileItems = []; 
            renderPreviews();
            document.getElementById('fileName').value = '';
            fileInput.value = '';

        } catch (err) { 
            console.error(err);
            alert("Error memproses file: " + err.message); 
        }
        convertBtn.innerText = "Proses & Download";
        convertBtn.disabled = false;
    };
</script>
</body>
</html>
