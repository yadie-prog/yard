<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate System - BASTK Hyundai</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="brand-header">
            <h2>SISTEM MONITORING BASTK</h2>
            <p>Silahkan lengkapi sesi operator sebelum masuk</p>
        </div>
        <form action="input.php" method="POST" id="loginForm">
            <div class="form-group">
                <label>Jenis BASTK</label>
                <select name="jenis_bastk" required>
                    <option value="" disabled selected>-- Pilih Jenis Kegiatan --</option>
                    <option value="BASTK Unit Masuk">BASTK Unit Masuk</option>
                    <option value="BASTK Unit Keluar">BASTK Unit Keluar</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nama Operator</label>
                <select name="operator_select" id="operatorSelect" required>
                    <option value="" disabled selected>-- Pilih Nama Operator --</option>
                    <option value="Misto">Misto</option>
                    <option value="Alfian">Alfian</option>
                    <option value="Efendi">Efendi</option>
                    <option value="Derry">Derry</option>
                    <option value="MANUAL">Input Nama Manual...</option>
                </select>
            </div>

            <div class="form-group hidden" id="manualOperatorGroup">
                <label>Input Nama Operator Manual</label>
                <input type="text" name="operator_manual" id="operatorManual" placeholder="Masukkan nama Anda">
            </div>

            <button type="submit" class="btn-primary">Masuk ke Form Input</button>
        </form>
    </div>
    <script src="../assets/js/app.js"></script>
</body>
</html>
