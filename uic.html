<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIC System - INPUT FORM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        /* --- UI Styles --- */
        .form-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 850px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .form-card { padding: 40px; }
            body { padding: 40px 20px; }
        }

        .form-header {
            margin-bottom: 25px;
            border-left: 5px solid var(--accent);
            padding-left: 15px;
        }

        .form-header h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .input-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .full { grid-column: span 2; }
        }

        .field-group { display: flex; flex-direction: column; }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        input, select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: white;
            font-size: 16px; 
            width: 100%;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: #1e293b;
        }

        .btn-print {
            margin-top: 30px;
            width: 90%;
            background: var(--accent);
            color: #0f172a;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* --- Print Specific Styles --- */
        #print-area { display: none; }

        @media print {
            @page { 
                size: A4 portrait; 
                margin: 0; 
            }
            
            body { background: white; padding: 0; margin: 0; }
            .form-card { display: none; }

            #print-area {
                display: block !important;
                width: 210mm;
                height: 297mm;
            }

            .print-wrapper {
                height: 148.5mm; /* Ukuran A5 exact */
                padding: 10mm;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
            }

            .print-container {
                border: 2pt solid #000;
                height: 100%;
                display: flex;
                flex-direction: column;
                color: black;
            }

            .print-header {
                padding: 10px 15px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 2pt solid #000;
                background: #f1f5f9 !important;
                -webkit-print-color-adjust: exact;
            }

            .print-body {
                padding: 15px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                column-gap: 30px;
                row-gap: 5px;
            }

            .info-row {
                display: flex;
                justify-content: space-between;
                border-bottom: 0.5pt solid #94a3b8;
                padding: 3px 0;
            }

            .info-label { font-weight: 700; font-size: 8pt; color: #334155; }
            .info-value { font-size: 9pt; font-weight: 600; text-align: right; }
            
            .footer-note {
                margin-top: auto;
                padding: 10px;
                font-size: 7pt;
                text-align: center;
                border-top: 1pt solid #000;
            }
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="form-header">
            <h2>UIC INFORMATION</h2>
            <p style="color: var(--text-dim); font-size: 0.8rem;">PT. Hyundai Solusi Mobilitas</p>
        </div>
        
        <form id="uicForm" class="input-grid">
            <div class="field-group">
                <label>Order Type</label>
                <select id="order_type">
                    <option value="Daily Rent">Daily Rent</option>
                    <option value="Monthly Rent">Monthly Rent</option>
                    <option value="Long Term">Long Term</option>
                </select>
            </div>
            <div class="field-group">
                <label>Unit Type</label>
                <select id="unit_type">
                    <option value="NEW CAR RENT">New Car Rent</option>
                    <option value="USED CAR RENT">Used Car Rent</option>
                </select>
            </div>
            <div class="field-group">
                <label>Customer</label>
                <input type="text" id="customer" placeholder="Nama Customer">
            </div>
            <div class="field-group">
                <label>Unit Name</label>
                <input type="text" id="unit" placeholder="Contoh: Ioniq 5">
            </div>
            <div class="field-group">
                <label>Quantity</label>
                <input type="number" id="quantity" value="1">
            </div>
            <div class="field-group">
                <label>PLAT NUMBER</label>
                <input type="text" id="nopol" placeholder="B1234ABC" oninput="this.value = this.value.toUpperCase().replace(/\s/g, '')">
            </div>
            <div class="field-group">
                <label>Rental Period</label>
                <input type="text" id="rental_period" placeholder="Contoh: 1 Tahun">
            </div>
            <div class="field-group">
                <label>Rental Fee (IDR)</label>
                <input type="text" id="rental_fee" placeholder="Contoh: 10.000.000">
            </div>
            <div class="field-group">
                <label>Agreement Number</label>
                <input type="text" id="agreement_number">
            </div>
            <div class="field-group">
                <label>Delivery Plan</label>
                <input type="date" id="delivery_plan">
            </div>
            <div class="field-group">
                <label>Time</label>
                <input type="time" id="time">
            </div>
            <div class="field-group">
                <label>PIC Name</label>
                <input type="text" id="pic">
            </div>
            <div class="field-group full">
                <label>Delivery Location</label>
                <input type="text" id="delivery_location">
            </div>
            <div class="field-group">
                <label>Phone Number</label>
                <input type="text" id="phone_number">
            </div>

            <button type="button" class="btn-print" onclick="generatePrint()">Print Document</button>
        </form>
    </div>

    <div id="print-area">
        <div class="print-wrapper">
            <div class="print-container">
                <div class="print-header">
                    <div>
                        <h1 style="margin:0; font-size: 16pt; font-weight: 800;">UIC INFORMATION</h1>
                        <p style="margin:0; font-size: 7pt; font-weight: 600;">PT. HYUNDAI SOLUSI MOBILITAS</p>
                    </div>
                    <div style="text-align: right; font-size: 6pt;">
                        <strong>OFFICIAL DOCUMENT</strong><br>
                        <span class="p-date"></span>
                    </div>
                </div>
                <div class="print-body p-data"></div>
                <div class="footer-note">Generated by UIC System</div>
            </div>
        </div>
        </div>

    <script>
        function generatePrint() {
            const fields = [
                { id: 'order_type', label: 'Order Type' },
                { id: 'unit_type', label: 'Unit Type' },
                { id: 'customer', label: 'Customer' },
                { id: 'unit', label: 'Unit Name' },
                { id: 'quantity', label: 'Qty' },
                { id: 'nopol', label: 'Nopol' },
                { id: 'rental_period', label: 'Period' },
                { id: 'rental_fee', label: 'Rental Fee' }, // Label Rental Fee ditambahkan
                { id: 'agreement_number', label: 'Agreement No' },
                { id: 'delivery_plan', label: 'Delivery Date' },
                { id: 'time', label: 'Time' },
                { id: 'pic', label: 'PIC' },
                { id: 'phone_number', label: 'Phone' },
                { id: 'delivery_location', label: 'Location' }
            ];

            let html = '';
            fields.forEach(f => {
                const val = document.getElementById(f.id).value || '-';
                html += `
                    <div class="info-row">
                        <div class="info-label">${f.label}</div>
                        <div class="info-value">${val}</div>
                    </div>
                `;
            });

            document.querySelector('.p-data').innerHTML = html;

            const now = new Date().toLocaleString('id-ID', { 
                dateStyle: 'medium', 
                timeStyle: 'short' 
            });
            document.querySelector('.p-date').innerText = now;

            window.print();
        }
    </script>
</body>
</html>
