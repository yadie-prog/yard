<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIC System - INPUT FORM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- UI Styles --- */
        .form-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: fit-content;
        }

        .form-header {
            margin-bottom: 30px;
            border-left: 5px solid var(--accent);
            padding-left: 20px;
        }

        .form-header h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.025em;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .field-group { display: flex; flex-direction: column; }
        
        /* Membuat lokasi delivery selalu memakan tempat penuh jika di layar lebar */
        .full-width { grid-column: 1 / -1; }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        input, select {
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: white;
            font-size: 15px; 
            width: 100%;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .button-container {
            grid-column: 1 / -1;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .btn-print {
            width: 100%;
            max-width: 400px;
            background: var(--accent);
            color: #0f172a;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-print:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-print:active { transform: translateY(0); }

        /* --- Print Specific Styles --- */
        #print-area { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            .form-card { display: none; }
            #print-area {
                display: block !important;
                width: 210mm;
            }
            .print-wrapper {
                height: 148.5mm; /* A5 Landscape look in A4 */
                padding: 15mm;
                box-sizing: border-box;
            }
            .print-container {
                border: 2pt solid #000;
                height: 100%;
                display: flex;
                flex-direction: column;
                color: black;
            }
            .print-header {
                padding: 15px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 2pt solid #000;
                background: #f1f5f9 !important;
                -webkit-print-color-adjust: exact;
            }
            .print-body {
                padding: 20px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                column-gap: 40px;
                row-gap: 8px;
            }
            .info-row {
                display: flex;
                justify-content: space-between;
                border-bottom: 0.5pt solid #cbd5e1;
                padding: 5px 0;
            }
            .info-label { font-weight: 700; font-size: 9pt; color: #334155; }
            .info-value { font-size: 10pt; font-weight: 600; text-align: right; }
            .footer-note {
                margin-top: auto;
                padding: 10px;
                font-size: 8pt;
                text-align: center;
                border-top: 1pt solid #000;
            }
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="form-header">
            <h2>UIC INFORMATION</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem; margin-top: 5px;">PT. Hyundai Solusi Mobilitas</p>
        </div>
        
        <form id="uicForm" class="input-grid">
            <div class="field-group">
                <label>Order Type</label>
                <select id="order_type">
                    <option value="Daily Rent">Daily Rent</option>
                    <option value="Monthly Rent">Monthly Rent</option>
                    <option value="Long Term">Long Term</option>
                </select>
            </div>
            <div class="field-group">
                <label>Unit Type</label>
                <select id="unit_type">
                    <option value="NEW CAR RENT">New Car Rent</option>
                    <option value="USED CAR RENT">Used Car Rent</option>
                </select>
            </div>
            <div class="field-group">
                <label>Customer</label>
                <input type="text" id="customer" placeholder="Nama Customer">
            </div>
            <div class="field-group">
                <label>Unit Name</label>
                <input type="text" id="unit" placeholder="Contoh: Ioniq 5">
            </div>
            <div class="field-group">
                <label>Quantity</label>
                <input type="number" id="quantity" value="1">
            </div>
            <div class="field-group">
                <label>PLAT NUMBER</label>
                <input type="text" id="nopol" placeholder="B1234ABC" oninput="this.value = this.value.toUpperCase().replace(/\s/g, '')">
            </div>
            <div class="field-group">
                <label>Rental Period</label>
                <input type="text" id="rental_period" placeholder="Contoh: 1 Tahun">
            </div>
            <div class="field-group">
                <label>Rental Fee (IDR)</label>
                <input type="text" id="rental_fee" placeholder="10.000.000">
            </div>
            <div class="field-group">
                <label>Agreement Number</label>
                <input type="text" id="agreement_number">
            </div>
            <div class="field-group">
                <label>Delivery Plan</label>
                <input type="date" id="delivery_plan">
            </div>
            <div class="field-group">
                <label>Time</label>
                <input type="time" id="time">
            </div>
            <div class="field-group">
                <label>PIC Name</label>
                <input type="text" id="pic">
            </div>
            <div class="field-group">
                <label>Phone Number</label>
                <input type="text" id="phone_number">
            </div>
            <div class="field-group full-width">
                <label>Delivery Location</label>
                <input type="text" id="delivery_location" placeholder="Alamat Lengkap">
            </div>

            <div class="button-container">
                <button type="button" class="btn-print" onclick="generatePrint()">Print Document</button>
            </div>
        </form>
    </div>

    <div id="print-area">
        <div class="print-wrapper">
            <div class="print-container">
                <div class="print-header">
                    <div>
                        <h1 style="margin:0; font-size: 18pt; font-weight: 800;">UIC INFORMATION</h1>
                        <p style="margin:0; font-size: 8pt; font-weight: 600; letter-spacing: 1px;">PT. HYUNDAI SOLUSI MOBILITAS</p>
                    </div>
                    <div style="text-align: right; font-size: 7pt;">
                        <strong>OFFICIAL DOCUMENT</strong><br>
                        <span class="p-date"></span>
                    </div>
                </div>
                <div class="print-body p-data"></div>
                <div class="footer-note">Generated by UIC System | Internal Document</div>
            </div>
        </div>
    </div>

    <script>
        function generatePrint() {
            const fields = [
                { id: 'order_type', label: 'Order Type' },
                { id: 'unit_type', label: 'Unit Type' },
                { id: 'customer', label: 'Customer' },
                { id: 'unit', label: 'Unit Name' },
                { id: 'quantity', label: 'Qty' },
                { id: 'nopol', label: 'Nopol' },
                { id: 'rental_period', label: 'Period' },
                { id: 'rental_fee', label: 'Rental Fee' },
                { id: 'agreement_number', label: 'Agreement No' },
                { id: 'delivery_plan', label: 'Delivery Date' },
                { id: 'time', label: 'Time' },
                { id: 'pic', label: 'PIC' },
                { id: 'phone_number', label: 'Phone' },
                { id: 'delivery_location', label: 'Location' }
            ];

            let html = '';
            fields.forEach(f => {
                const val = document.getElementById(f.id).value || '-';
                html += `
                    <div class="info-row">
                        <div class="info-label">${f.label}</div>
                        <div class="info-value">${val}</div>
                    </div>
                `;
            });

            document.querySelector('.p-data').innerHTML = html;

            const now = new Date().toLocaleString('id-ID', { 
                dateStyle: 'medium', 
                timeStyle: 'short' 
            });
            document.querySelector('.p-date').innerText = now;

            // Proses Cetak
            window.print();

            // Auto-Clear setelah dialog print tertutup (dengan sedikit delay agar browser stabil)
            setTimeout(() => {
                if(confirm("Apakah Anda ingin membersihkan form?")) {
                    document.getElementById("uicForm").reset();
                }
            }, 500);
        }
    </script>
</body>
</html>
